<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    /* 画像から抽出した配色 */
    --bg-grad-top: #f5ede3;
    --bg-grad-bot: #e8d8c8;
    --col-khaki:  #8b8a6a;   /* 出勤：カーキグレー */
    --col-sage:   #7a9a85;   /* 退勤：セージグリーン */
    --col-salmon: #e07a6a;   /* 休憩開始：サーモン */
    --col-yellow: #e8c94a;   /* 休憩終了：イエロー */
    --col-peach:  #d4956a;   /* 有給：ピーチ */

    --surface:  rgba(255,255,255,0.72);
    --surface2: rgba(255,255,255,0.5);
    --border:   rgba(160,120,90,0.3);
    --text:     #2a1a0a;
    --muted:    rgba(80,50,30,0.7);
    --shadow:   0 4px 20px rgba(160,100,60,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(160deg, var(--bg-grad-top) 0%, var(--bg-grad-bot) 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  /* ヘッダー */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 16px 20px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .header-left h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #5a3a20;
  }
  .header-left .date-now {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }
  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: #3a2a1a;
    letter-spacing: 0.05em;
  }

  /* 月ナビ */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    justify-content: center;
  }
  .month-nav button {
    background: var(--surface);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    color: #3a2a1a;
    padding: 6px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.15s;
  }
  .month-nav button:hover { background: rgba(255,255,255,0.7); }
  .month-nav .month-label {
    font-size: 18px;
    font-weight: 700;
    min-width: 100px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    color: #3a2a1a;
  }

  /* サマリーカード */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--surface);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .summary-card .label {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .summary-card .value {
    font-size: 20px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: #3a2a1a;
  }

  /* 今日のアクション */
  .today-panel {
    background: var(--surface);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .today-panel .panel-title {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .btn-row.wide { grid-template-columns: 1fr; }
  .action-btn {
    padding: 20px 8px 14px;
    border: none;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    gap: 4px;
    min-height: 80px;
    position: relative;
    color: #fff;
    box-shadow: 0 3px 12px rgba(0,0,0,0.2);
  }
  .action-btn .btn-icon {
    font-size: 22px;
    position: absolute;
    top: 14px;
    left: 14px;
  }
  .action-btn:active { transform: scale(0.96); box-shadow: 0 1px 6px rgba(0,0,0,0.2); }
  .btn-in          { background: var(--col-khaki); }
  .btn-out         { background: var(--col-sage); }
  .btn-break-start { background: var(--col-salmon); }
  .btn-break-end   { background: var(--col-yellow); color: #5a4200; }
  .btn-paid        { background: var(--col-peach); }
  .action-btn:disabled { opacity: 0.38; cursor: default; box-shadow: none; }
  .action-btn:not(:disabled):hover { filter: brightness(1.08); }

  .today-times {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .time-badge {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 5px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .time-badge .badge-label { font-size: 9px; color: var(--muted); }
  .time-badge .badge-val { font-weight: 600; color: #fff; }

  .overtime-badge {
    display: inline-block;
    margin-top: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.35);
  }

  /* 手入力エリア */
  .manual-panel {
    background: var(--surface);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .manual-panel .panel-title {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .manual-panel .panel-title .toggle-icon { margin-left: auto; transition: transform 0.2s; }
  .manual-panel .panel-title.open .toggle-icon { transform: rotate(180deg); }
  .manual-body { display: none; }
  .manual-body.open { display: block; }

  .manual-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 10px;
    align-items: center;
    margin-bottom: 10px;
  }
  .manual-row label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .manual-row input[type="date"],
  .manual-row input[type="time"],
  .manual-row select {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 7px 10px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .manual-row input:focus,
  .manual-row select:focus { border-color: rgba(255,255,255,0.7); }
  .manual-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .manual-grid .mg-item { display: flex; flex-direction: column; gap: 4px; }
  .manual-grid .mg-item label { font-size: 11px; color: var(--muted); }
  .manual-grid .mg-item input {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 7px 10px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
  }
  .manual-grid .mg-item input:focus { border-color: rgba(255,255,255,0.7); }
  .save-btn {
    width: 100%;
    padding: 11px;
    background: rgba(255,255,255,0.3);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.45);
    border-radius: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .save-btn:hover { background: rgba(255,255,255,0.4); }

  /* 月別一覧 */
  .list-panel {
    background: var(--surface);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .list-panel .panel-title {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .day-row {
    display: grid;
    grid-template-columns: 50px 1fr auto;
    gap: 6px;
    align-items: center;
    padding: 9px 8px;
    border-radius: 12px;
    margin-bottom: 3px;
    font-size: 13px;
    border: 1px solid transparent;
    transition: background 0.1s;
  }
  .day-row:hover { background: rgba(255,255,255,0.1); }
  .day-row.today-row { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.12); }
  .day-row .dow { font-weight: 700; font-size: 12px; color: var(--muted); }
  .day-row .dow.sat { color: #a8d4ff; }
  .day-row .dow.sun { color: #ffb0a0; }
  .day-row .day-date { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #3a2a1a; }
  .day-row .day-info { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .day-row .day-tags { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    white-space: nowrap;
  }
  .tag-ot     { background: rgba(232,201,74,0.3);  color: #f0d870; }
  .tag-paid   { background: rgba(212,149,106,0.3); color: #f0b880; }
  .tag-absent { background: rgba(255,176,160,0.25);color: #ffb0a0; }
  .tag-work   { background: rgba(122,154,133,0.35);color: #b0e0c0; }
  .day-row .edit-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 6px;
    transition: color 0.1s;
  }
  .day-row .edit-btn:hover { color: #fff; }

  .no-data { color: var(--muted); font-size: 12px; text-align: center; padding: 10px 0; }

  /* モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: rgba(245,237,227,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(180,140,110,0.3);
    border-radius: 24px 24px 0 0;
    padding: 20px 16px 32px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #3a2a1a; }
  .modal-close {
    float: right;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    margin-top: -4px;
  }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .modal-grid .mg-item { display: flex; flex-direction: column; gap: 4px; }
  .modal-grid .mg-item label { font-size: 11px; color: var(--muted); }
  .modal-grid .mg-item input,
  .modal-grid .mg-item select {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(180,140,110,0.3);
    color: #3a2a1a;
    padding: 9px 10px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .modal-grid .mg-item input:focus,
  .modal-grid .mg-item select:focus { border-color: var(--col-khaki); }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions .save-btn { flex: 1; }
  .modal-actions .del-btn {
    padding: 10px 14px;
    background: rgba(255,100,80,0.25);
    color: #ffb0a0;
    border: 1px solid rgba(255,100,80,0.5);
    border-radius: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }

  /* トースト */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(90,60,30,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    z-index: 200;
    transition: transform 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .break-info {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.2); margin: 12px 0; }

  .section-header {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* input/selectのoption文字色 */
  option { color: #333; background: #fff; }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-left">
    <h1>⏱ 勤怠管理</h1>
    <div class="date-now" id="dateNow"></div>
  </div>
  <div class="clock" id="clockDisplay"></div>
</div>

<!-- 月ナビ -->
<div class="month-nav">
  <button onclick="changeMonth(-1)">◀</button>
  <div class="month-label" id="monthLabel"></div>
  <button onclick="changeMonth(1)">▶</button>
</div>

<!-- サマリー -->
<div class="summary-grid">
  <div class="summary-card workdays">
    <div class="label">出勤日数</div>
    <div class="value" id="sumWorkdays">0</div>
  </div>
  <div class="summary-card overtime">
    <div class="label">総残業時間</div>
    <div class="value" id="sumOvertime">0:00</div>
  </div>
  <div class="summary-card paid">
    <div class="label">有給取得</div>
    <div class="value" id="sumPaid">0</div>
  </div>
</div>

<!-- 今日パネル（今月表示時のみ） -->
<div class="today-panel" id="todayPanel">
  <div class="panel-title">TODAY</div>
  <div class="btn-row">
    <button class="action-btn btn-in"  id="btnIn"  onclick="punch('in')"><span class="btn-icon">🗂</span>出勤</button>
    <button class="action-btn btn-out" id="btnOut" onclick="punch('out')"><span class="btn-icon">🗂</span>退勤</button>
  </div>
  <div class="btn-row">
    <button class="action-btn btn-break-start" id="btnBreakStart" onclick="punch('breakStart')"><span class="btn-icon">☕</span>休憩開始</button>
    <button class="action-btn btn-break-end"   id="btnBreakEnd"   onclick="punch('breakEnd')"><span class="btn-icon">🚴</span>休憩終了</button>
  </div>
  <div class="btn-row">
    <button class="action-btn btn-paid" id="btnPaid" onclick="showPaidMenu()"><span class="btn-icon">🌸</span>有給</button>
  </div>

  <!-- 有給選択メニュー -->
  <div id="paidMenu" style="display:none;margin-top:8px;background:rgba(255,255,255,0.85);border:1px solid rgba(160,120,90,0.3);border-radius:14px;overflow:hidden;">
    <div style="padding:10px 14px;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.06em;border-bottom:1px solid rgba(160,120,90,0.15);">有給の種類を選択</div>
    <button onclick="setPaid('paid_full')"  style="width:100%;padding:12px 14px;background:none;border:none;border-bottom:1px solid rgba(160,120,90,0.15);text-align:left;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;color:#2a1a0a;cursor:pointer;">🌸 1日有給</button>
    <button onclick="setPaid('paid_am')"   style="width:100%;padding:12px 14px;background:none;border:none;border-bottom:1px solid rgba(160,120,90,0.15);text-align:left;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;color:#2a1a0a;cursor:pointer;">🌸 半日有給（午前）→ 午後出勤</button>
    <button onclick="setPaid('paid_pm')"   style="width:100%;padding:12px 14px;background:none;border:none;text-align:left;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;color:#2a1a0a;cursor:pointer;">🌸 半日有給（午後）→ 午前出勤</button>
  </div>
  <div class="today-times" id="todayTimes"></div>
</div>

<!-- 手入力パネル -->
<div class="manual-panel">
  <div class="panel-title" onclick="toggleManual(this)">
    ✏️ 手入力・修正
    <span class="toggle-icon">▼</span>
  </div>
  <div class="manual-body" id="manualBody">
    <div class="manual-row">
      <label>日付</label>
      <input type="date" id="manDate">
    </div>
    <div class="manual-row">
      <label>種別</label>
      <select id="manType">
        <option value="work">通常出勤</option>
        <option value="paid_full">有給（1日）</option>
        <option value="paid_am">有給（午前）午後出勤</option>
        <option value="paid_pm">有給（午後）午前出勤</option>
        <option value="absent">欠勤</option>
      </select>
    </div>
    <div class="manual-grid">
      <div class="mg-item"><label>出勤</label><input type="time" id="manIn"></div>
      <div class="mg-item"><label>退勤</label><input type="time" id="manOut"></div>
      <div class="mg-item"><label>休憩開始</label><input type="time" id="manBreakStart"></div>
      <div class="mg-item"><label>休憩終了</label><input type="time" id="manBreakEnd"></div>
    </div>
    <button class="save-btn" onclick="manualSave()">💾 保存</button>
  </div>
</div>

<!-- 月別一覧 -->
<div class="list-panel">
  <div class="panel-title" id="listTitle">今月の記録</div>
  <div id="dayList"></div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="editModalTitle">記録を編集</h3>
    <input type="hidden" id="editDate">
    <div class="modal-grid">
      <div class="mg-item">
        <label>種別</label>
        <select id="editType">
          <option value="work">通常出勤</option>
          <option value="paid_full">有給（1日）</option>
          <option value="paid_am">有給（午前）午後出勤</option>
          <option value="paid_pm">有給（午後）午前出勤</option>
          <option value="absent">欠勤</option>
        </select>
      </div>
      <div class="mg-item"><label>出勤</label><input type="time" id="editIn"></div>
      <div class="mg-item"><label>退勤</label><input type="time" id="editOut"></div>
      <div class="mg-item"><label>休憩開始</label><input type="time" id="editBreakStart"></div>
      <div class="mg-item"><label>休憩終了</label><input type="time" id="editBreakEnd"></div>
    </div>
    <div class="modal-actions">
      <button class="save-btn" onclick="editSave()">💾 保存</button>
      <button class="del-btn" onclick="editDelete()">🗑</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ==================== データ管理 ====================
const STORAGE_KEY = 'attendance_v2';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ==================== 日付ユーティリティ ====================
function toDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function toTimeStr(d) {
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function parseTime(str) {
  if (!str) return null;
  const [h, m] = str.split(':').map(Number);
  return h * 60 + m;
}
function minutesToHHMM(min) {
  if (min < 0) min = 0;
  return Math.floor(min/60) + ':' + String(min%60).padStart(2,'0');
}

// 残業計算：休憩を除いた実労働時間 - 基準時間
// 平日 → 18:30 (1110分), 土曜 → 18:00 (1080分)
function calcOvertime(record, dateStr) {
  if (!record || record.type !== 'work') return 0;
  if (!record.out) return 0;
  const inMin  = parseTime(record.in);
  const outMin = parseTime(record.out);
  if (inMin == null || outMin == null) return 0;
  let work = outMin - inMin;
  // 休憩時間を引く
  if (record.breakStart && record.breakEnd) {
    const bs = parseTime(record.breakStart);
    const be = parseTime(record.breakEnd);
    if (bs != null && be != null && be > bs) work -= (be - bs);
  }
  const d = new Date(dateStr);
  const dow = d.getDay(); // 0=Sun,6=Sat
  let threshold;
  if (dow === 6) threshold = 18 * 60; // 18:00
  else threshold = 18 * 60 + 30;     // 18:30 (平日)
  // outMin - threshold で残業を計算（退勤時刻ベース）
  const ot = outMin - threshold;
  return ot > 0 ? ot : 0;
}

// ==================== 有給ヘルパー ====================
function isPaidType(type) {
  return type === 'paid_full' || type === 'paid_am' || type === 'paid_pm';
}
function isPaidFullDay(type) { return type === 'paid_full'; }
function paidLabel(type) {
  if (type === 'paid_full') return '🌸 有給（1日）';
  if (type === 'paid_am')   return '🌸 半日有給（午前）午後出勤';
  if (type === 'paid_pm')   return '🌸 半日有給（午後）午前出勤';
  return '';
}
function paidCount(type) {
  // 有給日数カウント：1日=1、半日=0.5
  if (type === 'paid_full') return 1;
  if (type === 'paid_am' || type === 'paid_pm') return 0.5;
  return 0;
}
let currentYear, currentMonth;
let todayStr;

function init() {
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth(); // 0-indexed
  todayStr = toDateStr(now);
  startClock();
  updateDateNow(now);
  render();
}

function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent = toTimeStr(now);
    updateDateNow(now);
    // 今月表示なら今日パネル更新
    if (isCurrentMonth()) renderTodayPanel();
  }
  tick();
  setInterval(tick, 10000);
}

function updateDateNow(now) {
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('dateNow').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日（' + days[now.getDay()] + '）';
}

function isCurrentMonth() {
  const now = new Date();
  return currentYear === now.getFullYear() && currentMonth === now.getMonth();
}

// ==================== 月変更 ====================
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
}

// ==================== メインレンダリング ====================
function render() {
  document.getElementById('monthLabel').textContent =
    currentYear + '年' + (currentMonth+1) + '月';
  document.getElementById('todayPanel').style.display = isCurrentMonth() ? '' : 'none';
  renderTodayPanel();
  renderSummary();
  renderDayList();
}

// ==================== 今日パネル ====================
function renderTodayPanel() {
  if (!isCurrentMonth()) return;
  const data = loadData();
  const rec = data[todayStr] || {};
  const hasIn    = !!rec.in;
  const hasOut   = !!rec.out;
  const inBreak  = !!rec.breakStart && !rec.breakEnd;
  const isFullPaid = rec.type === 'paid_full';
  // 半日有給（午前）→ 午後出勤できる、半日有給（午後）→ 午前出勤できる
  const isHalfPaid = rec.type === 'paid_am' || rec.type === 'paid_pm';

  document.getElementById('btnIn').disabled         = hasIn || isFullPaid;
  document.getElementById('btnOut').disabled        = !hasIn || hasOut || inBreak || isFullPaid;
  document.getElementById('btnBreakStart').disabled = !hasIn || hasOut || inBreak || isFullPaid;
  document.getElementById('btnBreakEnd').disabled   = !inBreak || isFullPaid;
  const paidBtn = document.getElementById('btnPaid');
  paidBtn.disabled = hasIn;

  // 有給メニューは出勤前のみ表示可能
  if (hasIn && document.getElementById('paidMenu').style.display !== 'none') {
    document.getElementById('paidMenu').style.display = 'none';
  }

  // 時刻バッジ
  const area = document.getElementById('todayTimes');
  area.innerHTML = '';
  if (isPaidType(rec.type)) {
    area.innerHTML += `<div class="overtime-badge" style="background:rgba(212,149,106,0.2);color:#7a4010;border-color:rgba(212,149,106,0.5)">${paidLabel(rec.type)}</div>`;
  }
  if (rec.in)         area.innerHTML += badge('出勤', rec.in);
  if (rec.breakStart) area.innerHTML += badge('休憩開始', rec.breakStart);
  if (rec.breakEnd)   area.innerHTML += badge('休憩終了', rec.breakEnd);
  if (rec.out) {
    area.innerHTML += badge('退勤', rec.out);
    const ot = calcOvertime(rec, todayStr);
    if (ot > 0) area.innerHTML += `<div class="overtime-badge">残業 ${minutesToHHMM(ot)}</div>`;
  }
}

function badge(label, val) {
  return `<div class="time-badge"><span class="badge-label">${label}</span><span class="badge-val">${val}</span></div>`;
}

// ==================== パンチ ====================
function punch(type) {
  const now = new Date();
  const timeStr = toTimeStr(now);
  const data = loadData();
  if (!data[todayStr]) data[todayStr] = { type: 'work' };
  const rec = data[todayStr];
  if (type === 'in')         { rec.in = timeStr; rec.type = 'work'; }
  else if (type === 'out')   { rec.out = timeStr; }
  else if (type === 'breakStart') { rec.breakStart = timeStr; }
  else if (type === 'breakEnd')   { rec.breakEnd = timeStr; }
  saveData(data);
  renderTodayPanel();
  renderSummary();
  renderDayList();
  showToast(type === 'in' ? '出勤を記録しました' :
            type === 'out' ? '退勤を記録しました' :
            type === 'breakStart' ? '休憩開始を記録しました' : '休憩終了を記録しました');
}

function showPaidMenu() {
  const menu = document.getElementById('paidMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function setPaid(paidType) {
  const data = loadData();
  if (!data[todayStr]) data[todayStr] = {};
  // 同じ種別をもう一度押したら解除
  if (data[todayStr].type === paidType) {
    delete data[todayStr].type;
    showToast('有給を解除しました');
  } else {
    data[todayStr].type = paidType;
    showToast(paidLabel(paidType) + ' を記録しました');
  }
  document.getElementById('paidMenu').style.display = 'none';
  saveData(data);
  renderTodayPanel();
  renderSummary();
  renderDayList();
}

// ==================== 手入力 ====================
function toggleManual(el) {
  el.classList.toggle('open');
  document.getElementById('manualBody').classList.toggle('open');
}

function manualSave() {
  const dateVal = document.getElementById('manDate').value;
  if (!dateVal) { showToast('日付を入力してください'); return; }
  const type  = document.getElementById('manType').value;
  const inT   = document.getElementById('manIn').value;
  const outT  = document.getElementById('manOut').value;
  const bsT   = document.getElementById('manBreakStart').value;
  const beT   = document.getElementById('manBreakEnd').value;
  const data = loadData();
  data[dateVal] = { type };
  if (inT)  data[dateVal].in = inT;
  if (outT) data[dateVal].out = outT;
  if (bsT)  data[dateVal].breakStart = bsT;
  if (beT)  data[dateVal].breakEnd = beT;
  saveData(data);
  // クリア
  document.getElementById('manDate').value = '';
  document.getElementById('manIn').value = '';
  document.getElementById('manOut').value = '';
  document.getElementById('manBreakStart').value = '';
  document.getElementById('manBreakEnd').value = '';
  renderTodayPanel();
  renderSummary();
  renderDayList();
  showToast('保存しました');
}

// ==================== サマリー ====================
function renderSummary() {
  const data = loadData();
  let workdays = 0, otMin = 0, paid = 0;
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = currentYear + '-' + String(currentMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const rec = data[ds];
    if (!rec) continue;
    if (isPaidType(rec.type)) {
      paid += paidCount(rec.type);
      // 半日有給で出勤もある場合はworkdaysにカウント
      if (rec.in) workdays++;
    } else if (rec.type === 'work') {
      if (rec.in) workdays++;
      otMin += calcOvertime(rec, ds);
    }
  }
  document.getElementById('sumWorkdays').textContent = workdays + '日';
  document.getElementById('sumOvertime').textContent = minutesToHHMM(otMin);
  // 0.5刻みで表示
  document.getElementById('sumPaid').textContent = (paid % 1 === 0 ? paid : paid.toFixed(1)) + '日';
}

// ==================== 日別一覧 ====================
function renderDayList() {
  const data = loadData();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const dowNames = ['日','月','火','水','木','金','土'];
  let html = '';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = currentYear + '-' + String(currentMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const dt = new Date(ds);
    const dow = dt.getDay();
    const rec = data[ds] || null;
    const isToday = ds === todayStr;
    const dowStr = dowNames[dow];
    const dowClass = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';

    let tags = '';
    let info = '';
    if (rec) {
      if (isPaidType(rec.type)) {
        tags += `<span class="tag tag-paid">${paidLabel(rec.type)}</span>`;
        // 半日有給で出勤記録がある場合
        if (rec.in) {
          const ot = calcOvertime(rec, ds);
          const parts = [];
          if (rec.in)  parts.push(rec.in);
          if (rec.out) parts.push('〜' + rec.out);
          info = parts.join(' ');
          if (ot > 0) tags += `<span class="tag tag-ot">残業${minutesToHHMM(ot)}</span>`;
        }
      } else if (rec.type === 'absent') {
        tags += `<span class="tag tag-absent">欠勤</span>`;
      } else if (rec.type === 'work') {
        if (rec.in) tags += `<span class="tag tag-work">出勤</span>`;
        const ot = calcOvertime(rec, ds);
        if (ot > 0) tags += `<span class="tag tag-ot">残業${minutesToHHMM(ot)}</span>`;
        const parts = [];
        if (rec.in)  parts.push(rec.in);
        if (rec.out) parts.push('〜' + rec.out);
        info = parts.join(' ');
        if (rec.breakStart && rec.breakEnd) info += ` 休憩${rec.breakStart}〜${rec.breakEnd}`;
      }
    }

    html += `
      <div class="day-row ${isToday ? 'today-row' : ''}">
        <div>
          <span class="dow ${dowClass}">${dowStr}</span>
          <div class="day-date">${d}日</div>
        </div>
        <div class="day-info">${info}</div>
        <div style="display:flex;align-items:center;gap:4px">
          <div class="day-tags">${tags}</div>
          <button class="edit-btn" onclick="openEdit('${ds}')">✎</button>
        </div>
      </div>`;
  }
  document.getElementById('dayList').innerHTML = html || '<div class="no-data">記録がありません</div>';
  document.getElementById('listTitle').textContent = currentYear + '年' + (currentMonth+1) + '月の記録';
}

// ==================== 編集モーダル ====================
function openEdit(ds) {
  const data = loadData();
  const rec = data[ds] || {};
  document.getElementById('editDate').value = ds;
  document.getElementById('editModalTitle').textContent = ds + ' を編集';
  document.getElementById('editType').value = rec.type || 'work';
  document.getElementById('editIn').value = rec.in || '';
  document.getElementById('editOut').value = rec.out || '';
  document.getElementById('editBreakStart').value = rec.breakStart || '';
  document.getElementById('editBreakEnd').value = rec.breakEnd || '';
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

function editSave() {
  const ds = document.getElementById('editDate').value;
  const type = document.getElementById('editType').value;
  const inT  = document.getElementById('editIn').value;
  const outT = document.getElementById('editOut').value;
  const bsT  = document.getElementById('editBreakStart').value;
  const beT  = document.getElementById('editBreakEnd').value;
  const data = loadData();
  data[ds] = { type };
  if (inT)  data[ds].in = inT;
  if (outT) data[ds].out = outT;
  if (bsT)  data[ds].breakStart = bsT;
  if (beT)  data[ds].breakEnd = beT;
  saveData(data);
  closeModal();
  renderTodayPanel();
  renderSummary();
  renderDayList();
  showToast('保存しました');
}

function editDelete() {
  const ds = document.getElementById('editDate').value;
  const data = loadData();
  delete data[ds];
  saveData(data);
  closeModal();
  renderTodayPanel();
  renderSummary();
  renderDayList();
  showToast('削除しました');
}

// モーダル外クリックで閉じる
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ==================== トースト ====================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ==================== 起動 ====================
init();

// 手入力の日付に今日をデフォルト
document.getElementById('manDate').value = new Date().toISOString().slice(0,10);
</script>
</body>
